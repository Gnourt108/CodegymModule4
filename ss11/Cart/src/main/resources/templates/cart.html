<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng của bạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        .cart-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .table th {
            font-weight: 600;
            background-color: #f8f9fa;
        }

        .total-row {
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container my-5">
    <h2 class="mb-4">
        <i class="bi bi-cart3"></i> Giỏ hàng của bạn
    </h2>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th style="width: 60px;"></th>
                <th>Sản phẩm</th>
                <th class="text-center">Giá</th>
                <th class="text-center" style="width: 140px;">Số lượng</th>
                <th class="text-end">Thành tiền</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${cart}">
                <td class="text-center">
                    <a th:href="@{/cart/remove/{id}(id=${entry.key})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này không?')">
                        ✕
                    </a>
                </td>

                <td>
                    <div class="d-flex align-items-center gap-3">
                        <img th:src="${entry.value.product.image}"
                             th:alt="${entry.value.product.name}"
                             class="cart-img">
                        <div>
                            <h6 class="mb-1" th:text="${entry.value.product.name}"></h6>
                        </div>
                    </div>
                </td>

                <td class="text-center fw-semibold">
                    <span th:text="${#numbers.formatDecimal(entry.value.product.newPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </td>
                
                <td class="text-center">
                    <form th:action="@{/cart/update}" method="post">
                        <input type="hidden" name="productId" th:value="${entry.key}">
                        <select name="quantity"
                                class="form-select form-select-sm mx-auto"
                                style="width: 90px;"
                                onchange="this.form.submit()">
                            <option th:each="i : ${#numbers.sequence(1,10)}"
                                    th:value="${i}"
                                    th:text="${i}"
                                    th:selected="${i == entry.value.quantity}">
                            </option>
                        </select>
                    </form>
                </td>
                
                <td class="text-end fw-bold">
                    <span th:text="${#numbers.formatDecimal(entry.value.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </td>
            </tr>
            
            <tr class="table-active total-row fw-bold">
                <td colspan="4" class="text-end">Tổng cộng:</td>
                <td class="text-end text-danger">
                    <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between mt-4">
        <a href="/products" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
        </a>

        <a th:href="@{/checkout}" class="btn btn-primary btn-lg">
            Tiến hành thanh toán
            <i class="bi bi-arrow-right"></i>
        </a>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
