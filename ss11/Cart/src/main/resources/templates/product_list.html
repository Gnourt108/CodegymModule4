<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container my-5">
    <div class="product-grid row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">

        <div th:each="p : ${products}" class="product-card col">
            <div class="card h-100 position-relative">

                <div th:if="${p.new}" class="badge-new position-absolute top-0 start-0 m-3">
                    <span class="badge bg-danger">NEW!</span>
                </div>

                <a th:href="@{/products/{id}(id=${p.id})}" class="text-decoration-none">
                    <img th:src="${p.image}"
                         th:alt="${p.name}"
                         class="card-img-top"
                         style="height: 200px; object-fit: cover;">
                </a>

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${p.name}">Tên sản phẩm</h5>

                    <span th:if="${p.oldPrice > 0}"
                          class="old-price text-decoration-line-through text-muted small"
                          th:text="${#numbers.formatDecimal(p.oldPrice,0,'COMMA',0,'POINT')} + ' đ'">
                        </span>

                    <span class="new-price fw-bold text-danger fs-5"
                          th:text="${#numbers.formatDecimal(p.newPrice,0,'COMMA',0,'POINT')} + ' đ'">
                    </span>

                    <form th:action="@{/cart/add/{id}(id=${p.id})}" method="post" class="mt-auto">
                        <button type="submit" class="btn btn-primary w-100 mt-3">
                            <i class="bi bi-cart-plus"></i> Mua ngay
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
