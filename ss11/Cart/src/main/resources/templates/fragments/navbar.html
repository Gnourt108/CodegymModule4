<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-danger fs-4" th:href="@{/products}">
            <i class="bi bi-flower1"></i> Giỏ Hoa Đẹp
        </a>

        <a th:href="@{/cart}" class="btn btn-outline-danger position-relative ms-auto">
            <i class="bi bi-cart3 fs-5"></i>
            <!-- Badge số lượng -->
            <span th:if="${cartCount > 0}"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  th:text="${cartCount}">
            </span>
        </a>
    </div>
</nav>
</body>
</html>
