<!-- src/main/resources/templates/index.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký Tài Khoản</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px 16px 0 0 !important;
      padding: 24px;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .btn-register {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    .btn-register:hover {
      opacity: 0.9;
    }
    .input-group-text {
      background-color: #f8f9fa;
      border-right: none;
    }
    .form-control {
      border-left: none;
    }
    .form-control.is-invalid {
      border-left: none;
    }
    .invalid-feedback {
      font-size: 12.5px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="card">
        <!-- Header -->
        <div class="card-header text-center text-white">
          <i class="bi bi-person-plus-fill fs-1"></i>
          <h4 class="mt-2 mb-0 fw-bold">Đăng Ký Tài Khoản</h4>
          <p class="mb-0 opacity-75 small">Vui lòng điền đầy đủ thông tin bên dưới</p>
        </div>

        <!-- Body -->
        <div class="card-body p-4">
          <form th:action="@{/register}" th:object="${userDto}" method="post" novalidate>

            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-person text-primary me-1"></i>First Name
              </label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-type"></i></span>
                <input type="text"
                       th:field="*{firstname}"
                       th:classappend="${#fields.hasErrors('firstname')} ? 'is-invalid' : ''"
                       class="form-control"
                       placeholder="Nhập first name..."/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('firstname')}"
                     th:errors="*{firstname}"></div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-person text-primary me-1"></i>Last Name
              </label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-type"></i></span>
                <input type="text"
                       th:field="*{lastname}"
                       th:classappend="${#fields.hasErrors('lastname')} ? 'is-invalid' : ''"
                       class="form-control"
                       placeholder="Nhập last name..."/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('lastname')}"
                     th:errors="*{lastname}"></div>
              </div>
            </div>


            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-telephone text-primary me-1"></i>Số Điện Thoại
              </label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-phone"></i></span>
                <input type="text"
                       th:field="*{phoneNumber}"
                       th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid' : ''"
                       class="form-control"
                       placeholder="VD: 0987654321"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('phoneNumber')}"
                     th:errors="*{phoneNumber}"></div>
              </div>
            </div>


            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-calendar3 text-primary me-1"></i>Tuổi
              </label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-123"></i></span>
                <input type="number"
                       th:field="*{age}"
                       th:classappend="${#fields.hasErrors('age')} ? 'is-invalid' : ''"
                       class="form-control"
                       placeholder="Nhập tuổi..." min="0"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('age')}"
                     th:errors="*{age}"></div>
              </div>
            </div>


            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="bi bi-envelope text-primary me-1"></i>Email
              </label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-at"></i></span>
                <input type="email"
                       th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                       class="form-control"
                       placeholder="example@email.com"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}"></div>
              </div>
            </div>


            <div class="d-grid">
              <button type="submit" class="btn btn-register btn-primary text-white">
                <i class="bi bi-check-circle me-2"></i>Đăng Ký Ngay
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
