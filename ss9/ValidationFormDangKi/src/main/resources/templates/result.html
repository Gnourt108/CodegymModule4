<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký Thành Công</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .card-header {
      background: linear-gradient(135deg, #43a047 0%, #1b5e20 100%);
      border-radius: 16px 16px 0 0 !important;
      padding: 28px;
    }
    .success-icon {
      width: 70px;
      height: 70px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }
    .table th {
      background-color: #f8f9fa;
      width: 40%;
      color: #555;
      font-weight: 600;
    }
    .table td {
      color: #333;
    }
    .table-bordered > :not(caption) > * > * {
      border-color: #e9ecef;
    }
    .badge-info-row {
      background: #e8f5e9;
      border-left: 4px solid #43a047;
      border-radius: 6px;
      padding: 12px 16px;
    }
    .btn-back {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn-back:hover {
      opacity: 0.88;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="card">
      <div class="card-header text-center text-white">
        <div class="success-icon">
          <i class="bi bi-check-lg fs-2 text-white"></i>
        </div>
        <h4 class="fw-bold mb-1">Đăng kí thành công</h4>
        <p class="mb-0 opacity-75 small">Chào mừng bạn đến với thế giới của GNOURT</p>
      </div>
      <div class="card-body p-4">
        <div class="badge-info-row mb-4">
          <i class="bi bi-info-circle-fill text-success me-2"></i>
          <span class="text-success fw-semibold">Tài khoản của bạn đã được tạo thành công</span>
        </div>

        <h6 class="text-muted fw-semibold mb-3">
          <i class="bi bi-person-lines-fill me-1"></i>Thông tin đăng kí
        </h6>

        <table class="table table-bordered table-hover align-middle">
          <tbody>
            <tr>
              <th><i class="bi bi-person me-1 text-primary"></i>First Name</th>
              <td th:text="${user.firstname}"></td>
            </tr>
            <tr>
              <th><i class="bi bi-person me-1 text-primary"></i>Last Name</th>
              <td th:text="${user.lastname}"></td>
            </tr>
            <tr>
              <th><i class="bi bi-phone me-1 text-primary"></i>Số Điện Thoại</th>
              <td th:text="${user.phoneNumber}"></td>
            </tr>
            <tr>
              <th><i class="bi bi-calendar3 me-1 text-primary"></i>Tuổi</th>
              <td th:text="${user.age}"></td>
            </tr>
            <tr>
              <th><i class="bi bi-envelope me-1 text-primary"></i>Email</th>
              <td th:text="${user.email}"></td>
            </tr>
          </tbody>
        </table>
        <div class="d-grid mt-4">
          <a href="/register" class="btn btn-back text-white text-decoration-none text-center">
            <i class="bi bi-arrow-left-circle me-2"></i>Đăng kí tài khoản mới
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
