<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập Nhật Bài Hát</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh;
            display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card-header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 16px 16px 0 0 !important; padding: 24px; }
        .form-control:focus { border-color: #f5576c; box-shadow: 0 0 0 0.2rem rgba(245,87,108,0.25); }
        .input-group-text { background: #f8f9fa; border-right: none; }
        .form-control { border-left: none; }
        .form-control.is-invalid { border-left: none; }
        .btn-submit { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none; border-radius: 8px; padding: 12px; font-weight: 600; }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-white text-center">
                    <i class="bi bi-pencil-square fs-1"></i>
                    <h5 class="fw-bold mt-2 mb-0">Cập Nhật Bài Hát</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/songs/edit/{id}(id=${song.id})}"
                          th:object="${song}" method="post" novalidate>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-music-note text-danger me-1"></i>Tên Bài Hát
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-music-note"></i></span>
                                <input type="text" class="form-control"
                                       th:field="*{title}"
                                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                                       placeholder="Nhập tên bài hát..."/>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('title')}"
                                     th:errors="*{title}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-person-circle text-danger me-1"></i>Nghệ Sĩ
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control"
                                       th:field="*{artist}"
                                       th:classappend="${#fields.hasErrors('artist')} ? 'is-invalid' : ''"
                                       placeholder="Nhập tên nghệ sĩ..."/>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('artist')}"
                                     th:errors="*{artist}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-tags text-danger me-1"></i>Thể Loại
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-tag"></i></span>
                                <input type="text" class="form-control"
                                       th:field="*{genre}"
                                       th:classappend="${#fields.hasErrors('genre')} ? 'is-invalid' : ''"
                                       placeholder="VD: Pop, Rock, Ballad..."/>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('genre')}"
                                     th:errors="*{genre}"></div>
                            </div>
                            <small class="text-muted">Có thể dùng dấu phẩy để phân cách nhiều thể loại</small>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-submit text-white">
                                <i class="bi bi-save me-2"></i>Lưu Thay Đổi
                            </button>
                            <a href="/songs" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Quay Lại
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
