<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Bài Hát</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px 12px 0 0 !important; }
        .btn-add { background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 8px; }
        .btn-add:hover { opacity: 0.88; }
        .table th { background: #f8f9fa; font-weight: 600; }
        .badge-genre { background: #e8eaf6; color: #5c35c5;
            border-radius: 20px; font-size: 12px; padding: 4px 10px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center py-3 px-4">
                <h5 class="text-white mb-0 fw-bold">
                    <i class="bi bi-music-note-list me-2"></i>Danh sách bài hát
                </h5>
                <a href="/songs/add" class="btn btn-add btn-sm text-white fw-semibold px-3">
                    <i class="bi bi-plus-circle me-1"></i>Thêm bài hát
                </a>
            </div>
            <div class="card-body py-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Tên Bài Hát</th>
                        <th>Nghệ Sĩ</th>
                        <th>Thể Loại</th>
                        <th class="text-center">Thao Tác</th>
                    </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(songs)}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="bi bi-music-note-beamed fs-1 d-block mb-2"></i>
                                Chưa có bài hát nào. Hãy thêm bài hát đầu tiên!
                            </td>
                        </tr>
                    <tr th:each="song, stat : ${songs}">
                        <td class="ps-4 text-muted" th:text="${stat.index + 1}"></td>
                        <td class="fw-semibold" th:text="${song.title}"></td>
                        <td th:text="${song.artist}"></td>
                        <td><span class="badge-genre" th:text="${song.genre}"></span></td>
                        <td class="text-center">
                            <a th:href="@{/songs/edit/{id}(id=${song.id})}" class="btn btn-sm btn-outline-primary me-1">Sửa</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
