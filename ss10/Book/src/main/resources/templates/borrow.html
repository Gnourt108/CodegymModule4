<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Mượn Thành Công</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #43a047, #1b5e20); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .code-box { background: #f3e5f5; border: 2px dashed #764ba2; border-radius: 12px;
      padding: 20px; text-align: center; }
    .borrow-code { font-size: 2.5rem; font-weight: 900; color: #764ba2; letter-spacing: 8px; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body p-4 text-center">
          <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
          <h4 class="fw-bold mt-3">Mượn sách thành công</h4>
          <p class="text-muted">Bạn đã mượn: <strong th:text="${book.title}"></strong></p>

          <div class="code-box my-4">
            <p class="text-muted mb-1">Mã mượn sách của bạn:</p>
            <div class="borrow-code" th:text="${borrowCode}"></div>
            <small class="text-danger mt-2 d-block">
              <i class="bi bi-exclamation-triangle me-1"></i>
              Lưu mã này để trả sách sau!
            </small>
          </div>

          <div class="d-grid gap-2">
            <a href="/books" class="btn btn-outline-primary">
              <i class="bi bi-house me-2"></i>Về Trang Chủ
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
