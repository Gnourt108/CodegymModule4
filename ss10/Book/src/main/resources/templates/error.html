<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lỗi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #ff6b6b, #c0392b); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card">
        <div class="card-body p-5 text-center">
          <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
          <h4 class="fw-bold mt-3">Có lỗi xảy ra</h4>
          <div class="d-grid gap-2 mt-4">
            <a href="/books" class="btn btn-danger text-white">
              <i class="bi bi-house me-2"></i>Về Trang Chủ
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
