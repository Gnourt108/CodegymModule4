<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thư Viện Sách</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .card-header { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px 12px 0 0 !important; }
    .badge-qty-ok { background: #e8f5e9; color: #2e7d32; border-radius: 20px; padding: 4px 12px; font-size: 13px; }
    .badge-qty-out { background: #fce4ec; color: #c62828; border-radius: 20px; padding: 4px 12px; font-size: 13px; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center py-3 px-4">
      <h5 class="text-white fw-bold mb-0"><i class="bi bi-book me-2"></i>Thư Viện Sách</h5>
      <a href="/books/add" class="btn btn-sm btn-light fw-semibold">
        Thêm Sách
      </a>
      <a href="/books/form" class="btn btn-sm btn-light fw-semibold">
        <i class="bi bi-arrow-return-left me-1"></i>Trả Sách
      </a>
    </div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0 align-middle">
        <thead>
        <tr>
          <th class="ps-4">#</th>
          <th>Tên Sách</th>
          <th>Tác Giả</th>
          <th class="text-center">Số Lượng</th>
          <th class="text-center">Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book, stat : ${books}">
          <td class="ps-4 text-muted" th:text="${stat.index + 1}"></td>
          <td class="fw-semibold" th:text="${book.title}"></td>
          <td th:text="${book.author}"></td>
          <td class="text-center">
                            <span th:if="${book.quantity > 0}" class="badge-qty-ok">
                                <i class="bi bi-check-circle me-1"></i>
                                <span th:text="${book.quantity}"></span> cuốn
                            </span>
            <span th:if="${book.quantity == 0}" class="badge-qty-out">
                                <i class="bi bi-x-circle me-1"></i>Hết sách
                            </span>
          </td>
          <td class="text-center">
            <a th:href="@{/books/{id}(id=${book.id})}"
               class="btn btn-sm btn-outline-primary">
              <i class="bi bi-eye me-1"></i>Chi Tiết
            </a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
