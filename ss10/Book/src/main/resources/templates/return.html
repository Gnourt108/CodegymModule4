<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trả Sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f093fb, #f5576c); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card-header { background: linear-gradient(135deg, #f093fb, #f5576c); border-radius: 16px 16px 0 0 !important; padding: 24px; }
        .btn-return { background: linear-gradient(135deg, #f093fb, #f5576c); border: none; border-radius: 8px; padding: 12px; font-weight: 600; }
        input:focus { border-color: #f5576c !important; box-shadow: 0 0 0 0.2rem rgba(245,87,108,0.25) !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header text-white text-center">
                    <i class="bi bi-arrow-return-left fs-1"></i>
                    <h5 class="fw-bold mt-2 mb-0">Trả Sách</h5>
                </div>
                <div class="card-body p-4">
                    <div th:if="${message}" class="alert alert-success d-flex align-items-center mb-4">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span th:text="${message}"></span>
                    </div>

                    <form action="/books/return" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nhập mã mượn sách:</label>
                            <input type="text" name="borrowCode" class="form-control form-control-lg text-center"
                                   placeholder="Nhập mã 5 chữ số..." maxlength="5" style="letter-spacing: 6px; font-size: 1.5rem; font-weight: bold;"/>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-return text-white">
                                <i class="bi bi-check-circle me-2"></i>Xác nhận trả sách
                            </button>
                            <a href="/books" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Quay lại
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
