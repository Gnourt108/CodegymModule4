<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card-header { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px 16px 0 0 !important; padding: 24px; }
        .btn-borrow { background: linear-gradient(135deg, #43a047, #1b5e20); border: none; border-radius: 8px; padding: 12px; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-white text-center">
                    <i class="bi bi-book-half fs-1"></i>
                    <h5 class="fw-bold mt-2 mb-0" th:text="${book.title}"></h5>
                </div>
                <div class="card-body p-4">
                    <table class="table table-bordered align-middle">
                        <tr>
                            <th><i class="bi bi-person me-1 text-primary"></i>Tác Giả</th>
                            <td th:text="${book.author}"></td>
                        </tr>
                        <tr>
                            <th><i class="bi bi-stack me-1 text-primary"></i>Số Lượng</th>
                            <td>
                                <span th:if="${book.quantity > 0}" class="text-success fw-bold"
                                      th:text="${book.quantity} + ' cuốn còn lại'"></span>
                                <span th:if="${book.quantity == 0}" class="text-danger fw-bold">Hết sách</span>
                            </td>
                        </tr>
                    </table>

                    <form th:action="@{/books/{id}/borrow(id=${book.id})}" method="post" class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-borrow text-white"
                                th:disabled="${book.quantity == 0}">
                            <i class="bi bi-bag-check me-2"></i>Mượn Sách
                        </button>
                        <a href="/books" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Quay Lại
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
