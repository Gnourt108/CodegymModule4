<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <th:block th:insert="~{layout/layout::library}"/>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-info text-white">
            <h4>Product Detail</h4>
        </div>
        <div class="card-body">

            <div class="mb-3 row">
                <label class="col-sm-3 col-form-label fw-bold">Product ID</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control" th:value="${product.id}" readonly>
                </div>
            </div>

            <div class="mb-3 row">
                <label class="col-sm-3 col-form-label fw-bold">Product Name</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control" th:value="${product.name}" readonly>
                </div>
            </div>

            <div class="mb-3 row">
                <label class="col-sm-3 col-form-label fw-bold">Price</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control" th:value="${product.price}" readonly>
                </div>
            </div>

            <div class="mb-3 row">
                <label class="col-sm-3 col-form-label fw-bold">Type</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control" th:value="${product.type}" readonly>
                </div>
            </div>

            <div class="mb-3 row">
                <label class="col-sm-3 col-form-label fw-bold">Created Date</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control"
                           th:value="${#dates.format(product.createdAt, 'dd/MM/yyyy')}" readonly>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{/products}" class="btn btn-secondary">Back</a>
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning text-white">Edit</a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
